<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>감독 위원회</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
    }

.stage {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  overflow: hidden;
}

.screen {
  position: relative;
  display: inline-block;
  line-height: 0;
  height: 100vh;
}

.bg {
  height: 100vh;
  width: auto;
  display: block;
}

.button {
    position:absolute;
    opacity:0;
    z-index:20;
}

    /* 뒤로가기 */
    .back {
      left: 8%;
      top: 4%;
      width: 35%;
      height: 8%;
    }

    /* 오타 덮개 */
    .cover1 {
      position: absolute;
      left: 12%;
      top: 28.7%;
      width: 45%;
      height: 1.2%;
      background: rgba(8, 6, 4, 0.97);
    }

   /* 오타 덮개 */
    .cover2 {
      position: absolute;
      left: 18%;
      top: 95%;
      width: 40%;
      height: 1%;
      background: rgba(8, 6, 4, 0.97);
    }

  </style>
</head>

<body>
<div class="stage">
  <div class="screen">
    <img src="committee.png?v=2" class="bg">

    <div class="cover1"></div>
<div class="cover2"></div>

    <a href="restricted.html" class="button back"></a>
  </div>
</div>
</body>
</html>
