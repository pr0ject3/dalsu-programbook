<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>감독 위원회</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
    }

.stage {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  overflow: hidden;
}

.screen {
  position: relative;
  display: inline-block;
  line-height: 0;
  height: 100vh;
}

.bg {
  height: 100vh;
  width: auto;
  display: block;
}

.button {
  position: absolute;
  background: red;
  opacity: 0.5;
  z-index: 10;
}

    /* 뒤로가기 */
    .back {
      left: 8%;
      top: 4%;
      width: 35%;
      height: 8%;
    }

    /* 오타 덮개 */
    .cover {
      position: absolute;
      left: 12%;
      top: 27.8%;
      width: 45%;
      height: 3%;
      background: rgba(18, 15, 11, 0.95);
    }

   /* 오타 덮개 */
    .cover {
      position: absolute;
      left: 15%;
      top: 80%;
      width: 30%;
      height: 1%;
      background: rgba(18, 15, 11, 0.95);
    }

    /* 수정 문구 */
    .fixed-text {
      position: absolute;
      left: 12.2%;
      top: 27%;
      width: 60%;
      color: #9f9277;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: -0.5px;
      font-family: sans-serif;
    }
  </style>
</head>

<body>
<div class="stage">
  <div class="screen">
    <img src="committee.png" class="bg">

    <div class="cover"></div>
    <div class="fixed-text">
      구역 운영 및 정보 통제 승인 권한 보유.
    </div>

    <a href="restricted.html" class="button back"></a>
  </div>
</div>
</body>
</html>
