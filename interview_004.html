<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>인터뷰 004 - 해아아버지</title>

<style>

html, body{
    margin:0;
    padding:0;
    background:#000;
    overflow:hidden;
}

.stage{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

.screen{
    position:relative;
    height:100vh;
    line-height:0;
}

.bg{
    height:100vh;
    width:auto;
    display:block;
}

/* 테스트용 버튼 표시 */
.button{
    position:absolute;
    opacity:0;
    z-index:20;
}

/* 뒤로가기 */
.back{
    left:2%;
    top:1%;
    width:23%;
    height:5%;
}

/* 영상 영역 */
.player{
    position:absolute;
    left:5.5%;
    top:40.5%;
    width:89%;
    height:36%;
    object-fit:contain;
    z-index:10;
    background:#000;
}

</style>
</head>

<body>

<div class="stage">
<div class="screen">

<img src="interview_004.png?v=1" class="bg">

<a href="media_archive.html?v=2" class="button back"></a>

<video
    class="player"
    controls
    playsinline
    preload="metadata"
>
    <source src="interview_004.mp4" type="video/mp4">
</video>

</div>
</div>

</body>
</html>
