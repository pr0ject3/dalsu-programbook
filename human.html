<!DOCTYPE html>
<html lang="ko">
<head>

}

.screen {

.bg {

.button {

    opacity:0;
    z-index:20;
}

    .back {
      left: 10%;
      top: 42%;
      width: 25%;
      height: 5%;

    .sell {
      left: 12%;
      top: 70%;
      width: 80%;
      height: 7%;
    }

    .buy {
      left: 12%;
      top: 80%;
      width: 80%;
      height: 7%;
    }
  </style>
</head>

<body>
<div class="stage">
  <div class="screen">
    <img src="sell_buy.png" class="bg">

    <a href="index.html" class="button back"></a>
    <a href="sell.html" class="button sell"></a>
    <a href="buy.html" class="button buy"></a>
  </div>
</div>
</body>
</html>
