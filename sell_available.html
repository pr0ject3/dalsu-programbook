<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판매 가능</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
    }

.stage {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  overflow: hidden;
}

.screen {
  position: relative;
  display: inline-block;
  line-height: 0;
  height: 100vh;
}

.bg {
  height: 100vh;
  width: auto;
  display: block;
}

    .amount-input {
      position: absolute;
      left: 41.5%;
      top: 69%;
      width: 17%;
      height: 4.6%;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(80, 40, 20, 0.6);
      color: #1a120c;
      font-size: 22px;
      text-align: center;
      outline: none;
    }

    .button {
      position: absolute;
  background: red;
  opacity: 0.5;
  z-index: 10;
    }

    .archive {
      left: 40%;
      top: 79%;
      width: 19%;
      height: 8%;
    }
  </style>
</head>

<body>
<div class="stage">
  <div class="screen">
    <img src="accepted_sell.png" class="bg">

    <input class="amount-input" type="text" placeholder="예: 300ml">

    <a href="archive_main.html" class="button archive"></a>
  </div>
</div>
</body>
</html>
