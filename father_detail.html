<!DOCTYPE html>

<style>

html, body{
    margin:0;
    padding:0;
    background:#000;

.stage{
    width:100vw;
    height:100vh;

    align-items:center;

.screen{

}

.button{
    position:absolute;
    opacity:0;
    z-index:20;
}

/* 뒤로가기 */
.back{
    left:2%;
    top:1%;
    width:23%;
    height:5%;
}

</style>
</head>

<body>

<div class="stage">
<div class="screen">

<img src="father_detail.png?v=1" class="bg">

</div>
